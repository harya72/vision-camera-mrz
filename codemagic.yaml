workflows:
  react-native-android:
    name: React Native Android
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: v20.11.0
      groups:
        - expo_credentials
    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
    scripts:
      - name: Install dependencies
        script: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn install --frozen-lockfile
      - name: Build Android
        script: |
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - user@example.com

  react-native-ios:
    name: React Native iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: v20.11.0
      groups:
        - apple_auth # For App Store Connect
        - expo_credentials
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - ~/.npm
        - ~/Library/Caches/CocoaPods
    scripts:
      - name: Install dependencies
        script: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn install --frozen-lockfile
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build iOS
        script: |
          # Note: Requires code signing configuration in Codemagic UI
          xcode-project build-ipa --workspace ios/*.xcworkspace --scheme mrz
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - user@example.com
